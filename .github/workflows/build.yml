name: Build GUI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: macos-arm64
            artifact: GCodeZAA-macos-arm64.dmg

          - os: macos-12
            platform: macos-x64
            artifact: GCodeZAA-macos-x64.dmg

          - os: windows-latest
            platform: windows-x64
            artifact: GCodeZAA-windows-x64-Setup.exe

          - os: ubuntu-22.04
            platform: linux-x64
            artifact: GCodeZAA-linux-x64.AppImage

          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: GCodeZAA-linux-arm64.AppImage
            no_open3d: "1"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-tk tk-dev libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-cursor0 fuse libfuse2

      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter tkinterdnd2

      - name: Install open3d
        if: ${{ !matrix.no_open3d }}
        run: pip install open3d

      - name: Build
        env:
          NO_OPEN3D: ${{ matrix.no_open3d || '0' }}
        run: python build_ci.py

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create \
            -volname "GCodeZAA" \
            -srcfolder "dist/GCodeZAA.app" \
            -ov -format UDZO \
            "dist/${{ matrix.artifact }}"

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "0.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$version `
            installer.iss
          Copy-Item installer_out\GCodeZAA-Setup.exe dist\${{ matrix.artifact }}

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin

          # Copy PyInstaller output
          cp -r dist/GCodeZAA/* AppDir/usr/bin/

          # Desktop entry
          cat > AppDir/GCodeZAA.desktop << 'EOF'
          [Desktop Entry]
          Name=GCodeZAA
          Exec=GCodeZAA
          Icon=gcodezaa
          Type=Application
          Categories=Utility;
          EOF

          # Icon
          if [ -f assets/icon.png ]; then
            cp assets/icon.png AppDir/gcodezaa.png
          else
            python3 -c "
          import struct, zlib
          sig = b'\x89PNG\r\n\x1a\n'
          def chunk(t,d): c=struct.pack('>I',len(d))+t+d; return c+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
          data = sig+chunk(b'IHDR',struct.pack('>IIBBBBB',1,1,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(b'\x00\x00\xd4\xff\xff'))+chunk(b'IEND',b'')
          open('AppDir/gcodezaa.png','wb').write(data)
            "
          fi

          # AppRun
          printf '#!/bin/sh\ncd "$(dirname "$0")"\nexec ./usr/bin/GCodeZAA "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          ARCH=${ARCH} ./appimagetool AppDir "dist/${{ matrix.artifact }}" || \
            tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C dist GCodeZAA

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4.2.1
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          name: GCodeZAA GUI ${{ github.ref_name }}
          body: |
            ## GCodeZAA GUI — ${{ github.ref_name }}

            Z Anti-Aliasing G-code post-processor s grafickým rozhraním.

            ### Stažení

            | Platforma | Soubor | Poznámka |
            |-----------|--------|----------|
            | macOS Apple Silicon (M1/M2/M3/M4) | `GCodeZAA-macos-arm64.dmg` | |
            | macOS Intel | `GCodeZAA-macos-x64.dmg` | |
            | Windows 10/11 x64 | `GCodeZAA-windows-x64-Setup.exe` | Spusť installer, vytvoří zástupce |
            | Linux x86_64 | `GCodeZAA-linux-x64.AppImage` | `chmod +x`, pak spusť |
            | Linux ARM64 (Raspberry Pi 4/5) | `GCodeZAA-linux-arm64.AppImage` | GUI funkční, ZAA bez open3d¹ |

            > ¹ open3d nemá oficiální Linux ARM64 wheels. ZAA processing bude přidán
            > až open3d vydá ARM64 build, nebo po migraci na cross-platform raycasting.

            ### Fork
            [Theaninova/GCodeZAA](https://github.com/Theaninova/GCodeZAA)
          files: artifacts/**
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
